services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otel/config.yaml"]
    restart: unless-stopped
    volumes:
      - ./otel-config.yml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      kafka:
        condition: service_healthy

  kafka:
    image: apache/kafka:4.0.2
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  cassandra:
    image: cassandra:5.0
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "observability-cluster"
      CASSANDRA_NUM_TOKENS: "16"
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  cassandra-store:
    build:
      context: ./consumer
    restart: unless-stopped
    environment:
      KAFKA_TOPIC: "otlp_spans"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_GROUP_ID: "trace-cassandra-writer"
      CASSANDRA_CONTACT_POINTS: "cassandra"
      CASSANDRA_KEYSPACE: "observability"
      CASSANDRA_TABLE: "trace_events"
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    command: ["python", "/app/store_to_cassandra.py"]

  elasticsearch-indexer:
    build:
      context: ./consumer
    restart: unless-stopped
    environment:
      KAFKA_TOPIC: "otlp_spans"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_GROUP_ID: "trace-elasticsearch-writer"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      ELASTICSEARCH_INDEX: "trace_spans"
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: ["python", "/app/store_to_elasticsearch.py"]

  cpp-service:
    build:
      context: ./cpp-service
    environment:
      PORT: "8082"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-collector:4318/v1/traces"
    depends_on:
      - otel-collector

  java-service:
    build:
      context: ./java-service
    environment:
      SERVER_PORT: "8081"
      CPP_SERVICE_URL: "http://cpp-service:8082/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "java-service"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "otlp"
      OTEL_LOGS_EXPORTER: "none"
    depends_on:
      - cpp-service
      - otel-collector

  go-service:
    build:
      context: ./go-service
    environment:
      PORT: "8080"
      JAVA_SERVICE_URL: "http://java-service:8081/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "go-service"
    ports:
      - "8080:8080"
    depends_on:
      - java-service
      - otel-collector
